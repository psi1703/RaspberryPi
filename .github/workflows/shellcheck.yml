name: Shell Check and Auto-Fix

on:
  push:
    branches: [ "pi-3-4-5" ]
  pull_request:
    branches: [ "pi-3-4-5" ]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    
    # Allows the runner to commit changes back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Run shfmt (Auto-Correct Syntax)
        uses: reviewdog/action-shfmt@v1
        with:
          # -w overwrites the files with fixes, -i 2 uses 2 spaces for indentation
          shfmt_flags: "-w -i 2 -sr"

      - name: Run ShellCheck (Quality Validation)
        uses: ludeeus/action-shellcheck@master

      - name: Commit and Push Changes Automatically
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-correct shell script formatting"
          file_pattern: "*.sh *.bash"
