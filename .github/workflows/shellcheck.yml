name: Shell Check and Auto-Fix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    
    # Permissions required to let the runner write changes back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Fetches the specific pull request or branch head rather than a detached commit
          ref: ${{ github.head_ref || github.ref }}

      - name: Run shfmt (Auto-Correct Syntax)
        uses: luizm/action-shfmt@v3
        with:
          args: -w -i 2 -sr .

      - name: Run ShellCheck (Quality Validation)
        uses: ludeeus/action-shellcheck@master

      - name: Commit and Push Changes Automatically
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-correct shell script formatting"
          file_pattern: "*.sh *.bash"
