# InitBox Raspberry Pi Zero 2W Profile

PROFILE_ID="pi-zero2w"
PROFILE_NAME="Raspberry Pi Zero 2W"
PROFILE_DESCRIPTION="Lightweight InitBox field device"

# Lab setup policy

REQUIRES_LAB_INTERNET="yes"
FIELD_INSTALL_ALLOWED="no"

# Hardware capability policy

SUPPORTS_DASHBOARD="no"
SUPPORTS_WEB_TERMINAL="yes"

# Supported modules

MODULE_ISI="yes"
MODULE_FMS="yes"
MODULE_HOTSPOT="yes"
MODULE_WEB_TERMINAL="yes"
MODULE_DASHBOARD="no"
MODULE_RTC="no"
MODULE_SNIFFER_BRIDGE="no"

# Default recommended modules for this profile

DEFAULT_MODULES="isi fms hotspot web-terminal"

# Management interface

PRIMARY_MANAGEMENT_INTERFACE="web-terminal"

# Notes

PROFILE_NOTES="Pi Zero 2W is resource-constrained. Do not install dashboard components on this profile."
