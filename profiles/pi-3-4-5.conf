# InitBox Raspberry Pi 3 / 4 / 5 Profile

PROFILE_ID="pi-3-4-5"
PROFILE_NAME="Raspberry Pi 3 / 4 / 5"
PROFILE_DESCRIPTION="Full InitBox field device for Raspberry Pi 3, 4, and 5 hardware"

# Lab setup policy

REQUIRES_LAB_INTERNET="yes"
FIELD_INSTALL_ALLOWED="no"

# Hardware capability policy

SUPPORTS_DASHBOARD="yes"
SUPPORTS_WEB_TERMINAL="yes"

# Supported modules

MODULE_ISI="yes"
MODULE_FMS="yes"
MODULE_HOTSPOT="yes"
MODULE_WEB_TERMINAL="yes"
MODULE_DASHBOARD="yes"
MODULE_RTC="yes"
MODULE_SNIFFER_BRIDGE="yes"

# Default recommended modules for this profile
#
# Dashboard includes the management UI path for this profile.
# The web-terminal module id remains supported as a compatibility alias,
# but it is not listed separately in defaults because it maps to the same
# dashboard module implementation.

DEFAULT_MODULES="isi fms hotspot dashboard rtc sniffer-bridge"

# Management interface

PRIMARY_MANAGEMENT_INTERFACE="dashboard"

# Notes

PROFILE_NOTES="Pi 3 / 4 / 5 devices support the full InitBox stack, including dashboard, hotspot, RTC, ISI/FMS services, and sniffer bridge operation."
